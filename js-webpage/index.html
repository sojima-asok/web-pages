<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
     <section class="Banner">
        <img src="images/banner.png" alt="Tech Banner" class="img-fluid w-100">
    </section>
<div class="container">
    <section class="calc">
        <div class="row align-items-center">

        <!-- Left Column -->
        <div class="col-lg-6 content-div">
            <h1 class="display-4 fw-bold">
               Just start with the calculator 
            </h1>

            <p class="lead my-4">
                Click the below button to get the calculator and start your calculation.
            </p>
            <div class="tn-cls">
            <a href="#scroll-calc" class="btn btn-primary btn-lg bt-one">
                Get Started
            </a>
            </div>
        </div>

        <!-- Right Column -->
        <div class="col-lg-6 text-center first-img">
            <img src="images/img1.png"
                 alt="Tech Banner"
                 class="img-fluid">
        </div>

    </div>
    </section>

</div>



     <section id="scroll-calc" class="sc-class">
       
        <div class="cal-class">
            <div class="calc-head text-center">
            <h1>CALCULATOR</h1>
        </div>
         <div class="container">
        <div class="calculator">
            <div id="display"></div>
            <div class="buttons">
                <div class="button">C</div>
                <div class="button">/</div>
                <div class="button">*</div>
                <div class="button">&larr;</div>
                <div class="button">7</div>
                <div class="button">8</div>
                <div class="button">9</div>
                <div class="button">-</div>
                <div class="button">4</div>
                <div class="button">5</div>
                <div class="button">6</div>
                <div class="button">+</div>
                <div class="button">1</div>
                <div class="button">2</div>
                <div class="button">3</div>
                <div class="button">.</div>
                <div class="button">(</div>
                <div class="button">0</div>
                <div class="button">)</div>
                <div id="equal" class="button">=</div>
                
            </div>
        </div>
        </div>
        </div>
    </section>


<section class="counter-class">
    <div class="container">
    <div class="card-container">



        <div class="row align-items-center">

        <!-- Left Column -->
        <div class="col-lg-6 tn-clss">
             <div class="card">
        <div class="counter">
            <h2>Counter</h2>

            <div class="count">
                <span>0</span>

            </div>
            <div class="counter-btns">
                <span class="decrement">-</span>
                <span class="reset">Reset</span>
                <span class="increment">+</span>
                
            </div>
        </div>  
    </div>
        </div>

        <!-- Right Column -->
        <div class="col-lg-6 text-right">
           <h1 class="display-4 fw-bold">
              Just lets start with the counter
            </h1>

            <p class="lead my-4">
                Now enjoy with the counter and start your counting.
            </p>

        </div>

    </div>



  

</div>
</div>
</section>

<section class="footer">
     <div class="container">
    <div class="form-head">
        <h2>Just fill the form</h2>
    </div>

   
        <form id="registerForm">
            

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your name">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm password">
            </div>

            <button type="submit" class="register-btn">Register</button>

            <p id="message"></p>
        </form>
    </div>


</section>
<hr style="border: none; height: 100px; background-color: #1e3a8a;margin:0px;">

    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
